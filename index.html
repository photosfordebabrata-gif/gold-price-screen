<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price Screen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #202124;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: left;
            padding: 20px;
            max-width: 500px;
        }
        .label {
            font-size: 16px;
            color: #70757a;
            margin-bottom: 4px;
        }
        .price-box {
            font-size: 36px;
            font-weight: normal;
            margin-bottom: 8px;
        }
        .meta-info {
            font-size: 14px;
            color: #70757a;
        }
        .disclaimer {
            color: #1a0dab;
            text-decoration: none;
            cursor: pointer;
        }
        .disclaimer:hover {
            text-decoration: underline;
        }
        .error {
            color: #d93025;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container" id="widget-container">
        <div id="loading-state">Loading real-time financial data...</div>
    </div>

    <script>
        const API_KEY = "goldapi-aedc7065e36f28e8ac7d9a5682eb0452-io";
        const url = "https://www.goldapi.io/api/XAU/INR";

        async function fetchGoldPrice() {
            const container = document.getElementById('widget-container');
            
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'x-access-token': API_KEY,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                
                // 1. CONVERSION MATH: GoldAPI gives price per Troy Ounce (31.1034768 grams).
                // We divide by 31.1034768 to get price per 1 gram, then multiply by 10 for the Indian standard.
                const pricePerOunce = data.price;
                const pricePer10Grams = (pricePerOunce / 31.1034768) * 10;

                // 2. FORMAT NUMBER: Format to local Indian comma notation (e.g., 1,52,760.00)
                const formattedPrice = new Intl.NumberFormat('en-IN', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(pricePer10Grams);

                // 3. FORMAT TIMESTAMP: Convert UTC timestamp into India Standard Time (IST)
                const apiTimestamp = data.timestamp * 1000; 
                const options = { 
                    day: 'numeric', 
                    month: 'short', 
                    hour: 'numeric', 
                    minute: '2-digit', 
                    hour12: true, 
                    timeZone: 'Asia/Kolkata' 
                };
                
                const formattedDate = new Intl.DateTimeFormat('en-IN', options).format(new Date(apiTimestamp));

                // Render UI identical to Google's search result layout
                container.innerHTML = `
                    <div class="label">Gold price now (per 10g)</div>
                    <div class="price-box">${formattedPrice} Indian Rupee</div>
                    <div class="meta-info">
                        <span>${formattedDate} IST</span>
                        <span>·</span>
                        <span class="disclaimer" onclick="alert('Data provided by GoldAPI. International spot prices converted to 10 grams. Local retail jewelry market prices may include additional import duty, GST, and making charges.')">Disclaimer</span>
                    </div>
                `;

            } catch (error) {
                console.error("Failed to fetch gold price data:", error);
                container.innerHTML = `
                    <div class="error">
                        Failed to load live data. Please check your API limits or refresh.
                    </div>
                `;
            }
        }

        fetchGoldPrice();
    </script>
</body>
</html>
