<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price Screen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #202124;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: left;
            padding: 20px;
            max-width: 500px;
        }
        .label {
            font-size: 16px;
            color: #70757a;
            margin-bottom: 4px;
        }
        .price-box {
            font-size: 36px;
            font-weight: normal;
            margin-bottom: 8px;
        }
        .meta-info {
            font-size: 14px;
            color: #70757a;
        }
        .disclaimer {
            color: #1a0dab;
            text-decoration: none;
            cursor: pointer;
        }
        .disclaimer:hover {
            text-decoration: underline;
        }
        .error {
            color: #d93025;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container" id="widget-container">
        <div id="loading-state">Loading real-time financial data...</div>
    </div>

    <script>
        const API_KEY = "goldapi-aedc7065e36f28e8ac7d9a5682eb0452-io";
        
        // Fetching Gold (XAU) directly priced in INR
        const url = "https://www.goldapi.io/api/XAU/INR";

        async function fetchGoldPrice() {
            const container = document.getElementById('widget-container');
            
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'x-access-token': API_KEY,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                
                // GoldAPI returns price per ounce. 
                // Note: If you want it per 10 grams (standard Indian metric), change this to: (data.price / 31.1034768) * 10
                const rawPrice = data.price; 

                // Format the price into the Indian Numbering System (en-IN)
                const formattedPrice = new Intl.NumberFormat('en-IN', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(rawPrice);

                // Format the timestamp provided by the API into India Standard Time (IST)
                const apiTimestamp = data.timestamp * 1000; // Convert to milliseconds
                const options = { 
                    day: 'numeric', 
                    month: 'short', 
                    hour: 'numeric', 
                    minute: '2-digit', 
                    hour12: true, 
                    timeZone: 'Asia/Kolkata' 
                };
                
                // Formats to look like: "16 Jun, 4:17 pm"
                const formattedDate = new Intl.DateTimeFormat('en-IN', options).format(new Date(apiTimestamp));

                // Render the Google Finance styled template
                container.innerHTML = `
                    <div class="label">Gold price now</div>
                    <div class="price-box">${formattedPrice} Indian Rupee</div>
                    <div class="meta-info">
                        <span>${formattedDate} IST</span>
                        <span>·</span>
                        <span class="disclaimer" onclick="alert('Data provided by GoldAPI.io. Spot prices may vary from local retail jewelry rates due to custom duties and local taxes.')">Disclaimer</span>
                    </div>
                `;

            } catch (error) {
                console.error("Failed to fetch gold price data:", error);
                container.innerHTML = `
                    <div class="error">
                        Failed to load live data. Check if your API key tier is active or try again later.
                    </div>
                `;
            }
        }

        // Execute the fetch immediately when the page loads
        fetchGoldPrice();
    </script>
</body>
</html>
